# Circle Take — local / Alibaba Cloud compose.
# - No env files present  -> fixture mode (safe, free, no creds). Good for a public testing link.
# - `.env.local` present  -> live mode (it sets APP_ENV=live + Qwen/OSS creds). Local live demo.
services:
  api:
    build: .
    image: circle-take-api:latest
    ports:
      - "8000:8000"
    env_file:
      - path: .env.local        # secrets + APP_ENV=live for a local LIVE demo (gitignored); optional
        required: false
      - path: .env              # policy-reserved; optional
        required: false
    volumes:
      - ct-data:/app/data
      - ./artifacts/live:/app/artifacts/live:ro   # serve real generated artifacts in live mode
    restart: unless-stopped

volumes:
  ct-data:
