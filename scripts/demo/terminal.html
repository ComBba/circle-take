<!doctype html>
<!-- Branded terminal that replays the REAL output of a live run
     (scripts/demo/build/live_run.log) for the demo "it actually runs" beat.
     Every line below is verbatim from a real `run_golden_path_live.py text`
     execution: real Qwen3.7-plus calls + real Alibaba Cloud OSS uploads. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap');
  :root{--bg:#0b0b0d;--term:#161618;--bar:#2b2b2e;--ink:#f3ecdf;--dim:#8a8f98;--red:#e6324b;--amber:#e6c069;--green:#56d364}
  *{box-sizing:border-box;margin:0}
  html,body{width:1920px;height:1080px;background:var(--bg);overflow:hidden;font-family:'JetBrains Mono',monospace}
  .wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
  .term{width:1480px;background:var(--term);border-radius:14px;box-shadow:0 40px 120px rgba(0,0,0,.6);overflow:hidden;border:1px solid #00000040}
  .bar{height:52px;background:var(--bar);display:flex;align-items:center;gap:10px;padding:0 20px}
  .dot{width:14px;height:14px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .title{margin-left:14px;color:var(--dim);font-size:18px;font-weight:600}
  .body{padding:34px 40px;min-height:560px;font-size:30px;line-height:1.6}
  .l{white-space:pre;opacity:0}
  .l.show{opacity:1}
  .prompt{color:var(--green)}.cmd{color:var(--ink);font-weight:600}
  .head{color:var(--amber);font-weight:700}
  .oss{color:var(--dim)}.oss b{color:var(--ink)}
  .ok{color:var(--green);font-weight:700}
  .cur{display:inline-block;width:14px;height:30px;background:var(--ink);vertical-align:-4px;animation:bl 1s step-end infinite}
  @keyframes bl{50%{opacity:0}}
  .badge{margin-top:26px;color:var(--dim);font-size:22px}
  .badge b{color:var(--red)}
</style>
</head>
<body>
<div class="wrap"><div class="term">
  <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="title">circle-take — live golden path · Qwen Cloud + Alibaba OSS</span></div>
  <div class="body" id="body"></div>
</div></div>
<script>
const L = [
  {h:'<span class="prompt">$</span> <span class="cmd">python scripts/run_golden_path_live.py text</span>', t:1400},
  {h:'<span class="head">== Contracts (qwen3.7-plus) ==</span>', t:900},
  {h:'<span class="head">== Storyboard + Shot Risk ==</span>', t:900},
  {h:'   <span class="oss">OSS: …oss-ap-southeast-1…/live/<b>actor_contracts.json</b></span>', t:380},
  {h:'   <span class="oss">OSS: …oss-ap-southeast-1…/live/<b>style_contract.json</b></span>', t:380},
  {h:'   <span class="oss">OSS: …oss-ap-southeast-1…/live/<b>story_contract.json</b></span>', t:380},
  {h:'   <span class="oss">OSS: …oss-ap-southeast-1…/live/<b>storyboard_slate.json</b></span>', t:380},
  {h:'   <span class="oss">OSS: …oss-ap-southeast-1…/live/<b>shot_risk_ledger.json</b></span>', t:380},
  {h:'<span class="ok">TEXT stage done</span>', t:700},
];
const body = document.getElementById('body');
let i = 0;
function step(){
  if(i>=L.length){ const b=document.createElement('div'); b.className='badge';
    b.innerHTML='real <b>Qwen3.7-plus</b> calls · real <b>Alibaba Cloud OSS</b> uploads — no mockups'; body.appendChild(b); return; }
  const d=document.createElement('div'); d.className='l'; d.innerHTML=L[i].h + (i===0?' <span class="cur"></span>':'');
  body.appendChild(d); requestAnimationFrame(()=>d.classList.add('show'));
  const wait=L[i].t; i++; setTimeout(step, wait);
}
setTimeout(step, 500);
</script>
</body>
</html>
