name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history for the secret scan
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies (pinned)
        run: pip install -r backend/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check backend scripts
      - name: Type check (mypy)
        run: python -m mypy app --ignore-missing-imports
        working-directory: backend
      - name: Test (pytest)
        run: python -m pytest -q
        working-directory: backend
      - name: Secret scan (gitleaks)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz -o gl.tgz
          tar -xzf gl.tgz gitleaks
          ./gitleaks detect --source . --no-banner --redact
